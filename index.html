<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Аркан тартыш: ЧК, ЧН, ЧТ</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f0f4f8;
    text-align:center;
    overflow:hidden;
}

#game-container{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-around;
}

#rope-area{
    position:relative;
    height:160px;
    background:white;
    border-top:5px solid #795548;
    border-bottom:5px solid #795548;
}

#rope{
    position:absolute;
    width:200%;
    height:20px;
    background:repeating-linear-gradient(
        90deg,
        #d7ccc8,
        #d7ccc8 20px,
        #8d6e63 20px,
        #8d6e63 40px
    );
    top:70px;
    left:-50%;
    transition:left 0.5s ease-out;
}

#marker{
    position:absolute;
    width:10px;
    height:90px;
    background:#ff5252;
    top:35px;
    left:50%;
    transform:translateX(-50%);
}

.players-left,
.players-right{
    position:absolute;
    top:10px;
    font-size:50px;
}

.players-left{
    left:20px;
}

.players-right{
    right:20px;
}

.teams{
    display:flex;
    justify-content:space-between;
    padding:0 100px;
    font-weight:bold;
    font-size:32px;
}

.team-1{ color:#2196f3; }
.team-2{ color:#4caf50; }

#question-card{
    background:white;
    margin:0 auto;
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:60%;
}

#word{
    font-size:80px;
    margin-bottom:30px;
    color:#333;
    font-weight:bold;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:40px;
}

button{
    padding:30px 60px;
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    border-radius:20px;
    color:white;
}

.btn-true{ background:#4caf50; }
.btn-false{ background:#f44336; }

#info{
    font-size:24px;
    color:#555;
}

#turn-display{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}
.player{
    display:inline-block;
    font-size:50px;
    transition: transform 0.2s;
}

.pull-left{
    animation: pullLeft 0.4s ease;
}

.pull-right{
    animation: pullRight 0.4s ease;
}

@keyframes pullLeft{
    0% { transform: translateX(0); }
    50% { transform: translateX(-15px); }
    100% { transform: translateX(0); }
}

@keyframes pullRight{
    0% { transform: translateX(0); }
    50% { transform: translateX(15px); }
    100% { transform: translateX(0); }
}
#winner-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
color:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:70px;
z-index:1000;
}

#confetti{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.confetti-piece{
position:absolute;
width:10px;
height:10px;
background:red;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div id="game-container">

<div class="teams">
<div class="team-1">КОМАНДА 1</div>
    Школы-интерната № 11 
    им. В. В. Терешковой 
<div class="team-2">КОМАНДА 2</div>
</div>

<div id="rope-area">

<div class="players-left" id="team1">
<span class="player">🧑</span>
<span class="player">🧑</span>
<span class="player">🧑</span>
</div>

<div class="players-right" id="team2">
<span class="player">🧑</span>
<span class="player">🧑</span>
<span class="player">🧑</span>
</div>

<div id="marker"></div>
<div id="rope"></div>

</div>

<div>
<div id="turn-display">Очередь: Команда 1</div>

<div id="question-card">
<div id="word">Слово...</div>

<div class="buttons">
<button class="btn-true" onclick="checkAnswer(true)">ПРАВИЛЬНО</button>
<button class="btn-false" onclick="checkAnswer(false)">НЕПРАВИЛЬНО</button>
</div>

</div>
</div>

<div id="info">
Вопрос: <span id="q-num">1</span> из 20
</div>

</div>

<script>
function showWinner(team){

let screen=document.getElementById("winner-screen")
let text=document.getElementById("winner-text")

text.innerText="🏆 Победила Команда "+team+"!"

screen.style.display="flex"

let confetti=document.getElementById("confetti")

for(let i=0;i<120;i++){

let piece=document.createElement("div")
piece.className="confetti-piece"

piece.style.left=Math.random()*100+"%"
piece.style.backgroundColor=
["red","yellow","blue","green","pink"][Math.floor(Math.random()*5)]

piece.style.animationDuration=(Math.random()*3+2)+"s"

confetti.appendChild(piece)

}

}

const questions = [
{w:"Ручка",correct:true},
{w:"Дочка",correct:false},
{w:"Точька",correct:true},
{w:"Печька",correct:false},
{w:"Ночка",correct:true},
{w:"Свечка",correct:true},
 {w:"Кочька",correct:false},
{w:"Точьный",correct:false},
{w:"Сочный",correct:true},
{w:"Ночной",correct:true},
{w:"Молочьный",correct:false},
{w:"Речьной",correct:false},
{w:"Личный",correct:true},
{w:"Почта",correct:true},
{w:"Отличьный",correct:false},
{w:"Мечьта",correct:false},
{w:"Чтение",correct:true},
{w:"Чтить",correct:true},
 {w:"Девочька",correct:false},
{w:"Почьтальон",correct:false}
];

let currentQ=0;
let ropePos=-50;
let turn=1;

function updateGame(){

if(currentQ>=questions.length){

let winner="";

if(ropePos<-50) winner="Победила Команда 1!";
else if(ropePos>-50) winner="Победила Команда 2!";
else winner="Ничья!";

alert("Игра завершена! "+winner);
location.reload();
return;
}

document.getElementById('word').innerText=questions[currentQ].w;
document.getElementById('q-num').innerText=currentQ+1;

const turnDiv=document.getElementById('turn-display');
turnDiv.innerText="Очередь: Команда "+turn;

document.getElementById('rope').style.left=ropePos+"%";
}

function checkAnswer(userAnswer){
animatePlayers(turn);
let isCorrect=(userAnswer===questions[currentQ].correct);


if(turn===1){
ropePos+=(isCorrect?-7:7);
}else{
ropePos+=(isCorrect?7:-7);
}

currentQ++;
turn=(turn===1)?2:1;

updateGame();
}

updateGame();
function animatePlayers(team){

let players = document.querySelectorAll(
team === 1 ? "#team1 .player" : "#team2 .player"
);

players.forEach(p=>{
p.classList.add(team===1 ? "pull-left":"pull-right");

setTimeout(()=>{
p.classList.remove("pull-left");
p.classList.remove("pull-right");
},400);

});

}

</script>
<div id="winner-screen">
<h1 id="winner-text"></h1>
<div id="confetti"></div>
</div>
</body>
</html>
