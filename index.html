<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Перетягивание каната: ЧК, ЧН, ЧТ</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #f0f4f8; text-align: center; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: space-around; }
        
        /* Поле и канат */
        #rope-area { position: relative; height: 140px; background: white; border-top: 5px solid #795548; border-bottom: 5px solid #795548; }
        #rope { position: absolute; width: 200%; height: 20px; background: repeating-linear-gradient(90deg, #d7ccc8, #d7ccc8 20px, #8d6e63 20px, #8d6e63 40px); top: 60px; left: -50%; transition: left 0.5s ease-out; }
        #marker { position: absolute; width: 10px; height: 80px; background: #ff5252; top: 30px; left: 50%; transform: translateX(-50%); z-index: 10; border-radius: 5px; }
        
        /* Команды */
        .teams { display: flex; justify-content: space-between; padding: 0 100px; font-weight: bold; font-size: 32px; }
        .team-1 { color: #2196f3; }
        .team-2 { color: #4caf50; }

        /* Карточка вопроса */
        #question-card { background: white; margin: 0 auto; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 60%; }
        #word { font-size: 80px; margin-bottom: 30px; color: #333; font-weight: bold; }
        
        /* Кнопки */
        .buttons { display: flex; justify-content: center; gap: 40px; }
        button { padding: 30px 60px; font-size: 32px; font-weight: bold; cursor: pointer; border: none; border-radius: 20px; color: white; transition: 0.2s; }
        .btn-true { background: #4caf50; box-shadow: 0 6px #388e3c; }
        .btn-false { background: #f44336; box-shadow: 0 6px #d32f2f; }
        button:active { transform: translateY(4px); box-shadow: 0 2px #388e3c; }

        #info { font-size: 24px; color: #555; }
        #turn-display { font-size: 28px; font-weight: bold; margin-bottom: 10px; padding: 10px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="teams">
        <div class="team-1">КОМАНДА 1</div>
        <div class="team-2">КОМАНДА 2</div>
    </div>

    <div id="rope-area">
        <div id="marker"></div>
        <div id="rope"></div>
    </div>

    <div>
        <div id="turn-display">Сейчас очередь: Команда 1</div>
        <div id="question-card">
            <div id="word">Слово...</div>
            <div class="buttons">
                <button class="btn-true" onclick="checkAnswer(true)">ПРАВИЛЬНО</button>
                <button class="btn-false" onclick="checkAnswer(false)">НЕПРАВИЛЬНО</button>
            </div>
        </div>
    </div>

    <div id="info">Вопрос: <span id="q-num">1</span> из 20</div>
</div>

<script>
    const questions = [
        {w: "Дочка", correct: true}, {w: "Дочька", correct: false},
        {w: "Речка", correct: true}, {w: "Почта", correct: true},
        {w: "Ночьной", correct: false}, {w: "Ночной", correct: true},
        {w: "Печка", correct: true}, {w: "Печька", correct: false},
        {w: "Птичка", correct: true}, {w: "Птичька", correct: false},
        {w: "Почта", correct: true}, {w: "Почьта", correct: false},
        {w: "Лисичка", correct: true}, {w: "Солнечный", correct: true},
        {w: "Кочька", correct: false}, {w: "Кочка", correct: true},
        {w: "Чтение", correct: true}, {w: "Сказочьный", correct: false},
        {w: "Ёлочка", correct: true}, {w: "Свечка", correct: true}
    ];

    let currentQ = 0;
    let ropePos = -50; 
    let turn = 1;

    function updateGame() {
        if(currentQ >= questions.length) {
            let winner = "";
            if (ropePos < -50) winner = "Победила Команда 1!";
            else if (ropePos > -50) winner = "Победила Команда 2!";
            else winner = "Ничья!";
            
            alert("Игра завершена! " + winner);
            location.reload();
            return;
        }
        
        document.getElementById('word').innerText = questions[currentQ].w;
        document.getElementById('q-num').innerText = currentQ + 1;
        
        const turnDiv = document.getElementById('turn-display');
        turnDiv.innerText = "Сейчас очередь: Команда " + turn;
        turnDiv.style.backgroundColor = (turn === 1 ? "#e3f2fd" : "#e8f5e9");
        turnDiv.style.color = (turn === 1 ? "#1e88e5" : "#43a047");
        
        document.getElementById('rope').style.left = ropePos + "%";
    }

    function checkAnswer(userAnswer) {
        let isCorrect = (userAnswer === questions[currentQ].correct);
        
        // Логика: если Команда 1 отвечает верно, канат идет влево (минус)
        // Если Команда 2 отвечает верно, канат идет вправо (плюс)
        if (turn === 1) {
            ropePos += (isCorrect ? -6 : 6);
        } else {
            ropePos += (isCorrect ? 6 : -6);
        }

        currentQ++;
        turn = (turn === 1) ? 2 : 1;
        updateGame();
    }

    updateGame();
</script>

</body>
</html>
